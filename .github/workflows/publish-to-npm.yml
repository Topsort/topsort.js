name: Release

on:
  release:
    types: [published]

jobs:
  npm-publish:
    name: Publish to NPM
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          registry-url: https://registry.npmjs.org

      - name: Run tests
        run: bun run test

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

        # The `test:e2e` command invokes `bun build` but we keep it here in case it changes
      - name: Run e2e tests
        run: bun run build

      - name: Run e2e tests
        run: bun run test:e2e

      - name: Publish web SDK to npm
        id: publish-web
        working-directory: packages/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@topsort/sdk@${VERSION}" version > /dev/null 2>&1; then
            echo "@topsort/sdk@${VERSION} is already on npm; skipping."
          else
            npm publish --provenance --access public --no-git-checks
          fi
        env:
          NPM_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Publish React Native SDK to npm
        id: publish-react-native
        working-directory: packages/react-native
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@topsort/react-native-sdk@${VERSION}" version > /dev/null 2>&1; then
            echo "@topsort/react-native-sdk@${VERSION} is already on npm; skipping."
          else
            npm publish --provenance --access public --no-git-checks
          fi
        env:
          NPM_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
